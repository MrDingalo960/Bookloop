<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sell a Book | BookLoop</title>
</head>
<body class="bg-gray-50 pb-10">

    <nav class="p-4 bg-white shadow-sm flex justify-between items-center mb-8">
        <a href="index.html" class="text-2xl font-bold text-blue-600">BookLoop</a>
        <a href="index.html" class="text-gray-600 hover:text-blue-600 font-medium">← Back to Market</a>
    </nav>

    <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <h2 class="text-2xl font-bold mb-2">List Your Textbook</h2>
        <p class="text-gray-500 mb-8 text-sm">Fill in the details below to reach thousands of students in Gaborone.</p>

        <form id="sellForm" onsubmit="handleUpload(event)" class="space-y-6">
            
            <div class="border-2 border-dashed border-gray-200 rounded-2xl p-8 text-center hover:border-blue-400 transition cursor-pointer bg-gray-50">
                <div class="text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-sm font-medium">Click to upload book cover photo</p>
                </div>
                <input type="file" class="hidden">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Book Title</label>
                <input type="text" id="bookTitle" required placeholder="e.g. Introduction to Programming" 
                       class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Course Code</label>
                    <input type="text" id="courseCode" required placeholder="e.g. BIDA121" 
                           class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Price (BWP)</label>
                    <input type="number" id="bookPrice" required placeholder="P250" 
                           class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Condition</label>
                <select id="condition" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-white">
                    <option>New / Unused</option>
                    <option>Like New (No writing)</option>
                    <option>Good (Small highlights)</option>
                    <option>Fair (Wear & Tear)</option>
                </select>
            </div>

            <div id="successMsg" class="hidden bg-green-100 text-green-700 p-4 rounded-xl text-center font-bold">
                🎉 Listing Posted Successfully! Redirecting...
            </div>

            <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                Post Listing
            </button>
        </form>
    </div>

    <script>
        function handleUpload(event) {
            event.preventDefault(); // Stop page from refreshing
            
            const btn = document.getElementById('submitBtn');
            const success = document.getElementById('successMsg');
            const form = document.getElementById('sellForm');

            // 1. Visual Feedback: Loading State
            btn.innerHTML = "Processing...";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            // 2. Simulate Database "Save" Delay
            setTimeout(() => {
                form.classList.add('hidden');
                success.classList.remove('hidden');

                // 3. Redirect back to market after 2 seconds
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);
            }, 1500);

            // Logic Note for your Report: 
            // In a real application, we would use:
            // INSERT INTO Books (Title, Course, Price) VALUES (...)
        }
    </script>
</body>
</html>
