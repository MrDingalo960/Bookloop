<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>BookLoop | Botswana Student Marketplace</title>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white p-2 rounded-lg font-black text-xl">B</div>
                <h1 class="text-2xl font-black text-blue-600 tracking-tighter">BookLoop</h1>
            </div>
            
            <div class="hidden md:flex items-center gap-8 font-semibold text-slate-600">
                <a href="index.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Browse Market</a>
                <a href="profile.html" class="hover:text-blue-600 transition">My Dashboard</a>
                <a href="sells.html" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl shadow-md hover:bg-blue-700 hover:shadow-lg transition transform active:scale-95">
                    Sell a Book
                </a>
            </div>
        </div>
    </nav>

    <header class="bg-white py-16 px-6 border-b border-slate-100">
        <div class="max-w-4xl mx-auto text-center">
            <span class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-sm font-bold uppercase tracking-wider">Serving Tertiary Institutions</span>
            <h2 class="text-5xl font-black mt-6 mb-4 tracking-tight leading-tight">
                Don't overpay for <span class="text-blue-600 underline decoration-blue-200">Textbooks.</span>
            </h2>
            <p class="text-lg text-slate-500 mb-10 max-w-xl mx-auto">
                The smart way to buy and sell used academic books directly on campus. 100% Student Verified.
            </p>

            <div class="relative max-w-2xl mx-auto group">
                <input type="text" id="search-input" oninput="performSearch()"
                       placeholder="Search by Title or Course Code (e.g., BIDA311, ACCA)..." 
                       class="w-full pl-6 pr-32 py-5 bg-slate-100 border-2 border-transparent rounded-2xl outline-none focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-100 transition-all text-lg shadow-inner">
                <button onclick="performSearch()" 
                        class="absolute right-2 top-2 bottom-2 bg-blue-600 text-white px-8 rounded-xl font-bold hover:bg-blue-700 transition">
                    Search
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-xl font-bold text-slate-800">Available Books in Gaborone</h3>
            <p id="result-count" class="text-slate-400 text-sm font-medium">Showing all listings</p>
        </div>

        <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        // Mock Database (BIDA/BICA Focused)
        const books = [
            { id: 1, title: "Financial Reporting", course: "BIDA311", price: "P450", condition: "Like New", img: "https://placehold.co/300x400/0066FF/white?text=Accounting" },
            { id: 2, title: "Python for Data Science", course: "BIDA121", price: "P320", condition: "Good", img: "https://placehold.co/300x400/3776AB/white?text=Python" },
            { id: 3, title: "Audit & Assurance", course: "BICA", price: "P550", condition: "Excellent", img: "https://placehold.co/300x400/4F46E5/white?text=Audit" },
            { id: 4, title: "Database Management", course: "BIDA211", price: "P280", condition: "Fair", img: "https://placehold.co/300x400/F37021/white?text=Oracle" },
            { id: 5, title: "Business Economics", course: "ECO101", price: "P150", condition: "Good", img: "https://placehold.co/300x400/10B981/white?text=Economics" },
            { id: 6, title: "Intro to Marketing", course: "MKT200", price: "P210", condition: "New", img: "https://placehold.co/300x400/EC4899/white?text=Marketing" }
        ];

        function performSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('results-grid');
            const countLabel = document.getElementById('result-count');

            // Filter logic (Equivalent to SQL WHERE clause)
            const filtered = books.filter(book => 
                book.title.toLowerCase().includes(query) || 
                book.course.toLowerCase().includes(query)
            );

            // Update result count text
            countLabel.innerText = `${filtered.length} books found`;

            // Clear existing items
            grid.innerHTML = '';

            // Render matching items
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <p class="text-slate-400 text-lg">No books matching "${query}" were found.</p>
                        <button onclick="document.getElementById('search-input').value=''; performSearch();" class="mt-4 text-blue-600 font-bold underline">Clear Search</button>
                    </div>`;
                return;
            }

            filtered.forEach(book => {
                grid.innerHTML += `
                    <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 overflow-hidden group">
                        <div class="relative h-64 bg-slate-200 overflow-hidden">
                            <img src="${book.img}" alt="${book.title}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-black text-blue-600 shadow-sm">
                                ${book.condition}
                            </div>
                        </div>
                        <div class="p-6">
                            <span class="text-[10px] font-black tracking-widest text-slate-400 uppercase">${book.course}</span>
                            <h4 class="text-lg font-bold mt-1 text-slate-800 line-clamp-1">${book.title}</h4>
                            <div class="mt-6 flex items-center justify-between">
                                <span class="text-2xl font-black text-slate-900">${book.price}</span>
                                <button class="bg-slate-900 text-white p-3 rounded-xl hover:bg-blue-600 transition shadow-md active:scale-90">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // Initialize grid on load
        window.onload = performSearch;
    </script>
</body>
</html>
